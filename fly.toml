# fly.toml app configuration file for tbt-bot

app = 'tbt-bot'
primary_region = 'sjc'

[build]
  dockerfile = "Dockerfile"

# Optional persistent volume (not used yet until you switch DB path)
[[mounts]]
  source = 'data'
  destination = '/data'
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false       # keep bot running
  auto_start_machines = true
  min_machines_running = 1         # ensure 24/7 uptime
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024


